<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/x-icon" href="./logo.ico">
    <title>쿼터파이 부원 모집 결과 조회</title>
    <!-- 폰트 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <style>
        /* --- 쿼터파이 디자인 시스템 --- */
        :root {
            --bg: #FEF9E6;
            --text: #282828;
            --red-dark: #8B1F28;
            --red-main: #BC1F1F;
            --orange: #CC5419;
            --yellow: #D4A829;
            --gray-line: rgba(0,0,0,0.1);
            --input-bg: #FFFFFF;
            --font-serif: "Noto Serif KR", serif;
            --font-sans: "Pretendard", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* 종이 질감 효과 */
        .paper-grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0; opacity: 0.6;
        }

        /* 컨테이너 */
        .main-container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease;
        }

        /* 카드 스타일 */
        .form-card {
            background: var(--bg);
            border: 1.5px solid var(--text);
            padding: 40px 32px;
            position: relative;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        /* VHS 디자인 요소 */
        .vhs-deco {
            display: flex; flex-direction: column; gap: 4px;
            margin-bottom: 30px;
        }
        .stripe { width: 100%; }
        .s-3 { height: 12px; background: var(--red-main); }
        .s-2 { height: 8px; background: var(--orange); }
        .s-1 { height: 4px; background: var(--yellow); }

        /* 헤더 텍스트 */
        .brand-header { margin-bottom: 20px; text-align: left; }
        .brand-logo {
            font-family: var(--font-serif);
            font-size: 1rem;
            font-weight: 700;
            color: var(--red-dark);
            margin-bottom: 8px;
            display: block;
        }
        .form-title {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
            color: var(--text);
            word-break: keep-all;
        }

        /* 입력 폼 스타일 */
        .input-group { margin-bottom: 24px; }
        .input-group label {
            display: block;
            font-family: var(--font-serif);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--red-dark);
            margin-bottom: 8px;
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #ccc;
            border-radius: 0; /* 아날로그 느낌을 위해 둥근 모서리 제거 */
            font-size: 1rem;
            font-family: var(--font-sans);
            background: var(--input-bg);
            color: var(--text);
            transition: border-color 0.3s ease;
            appearance: none; /* 기본 스타일 제거 */
        }

        .input-group input:focus, 
        .input-group select:focus {
            border-color: var(--red-main);
            outline: none;
        }

        /* 날짜 입력 컨테이너 */
        .date-input-container {
            display: flex; gap: 10px;
        }
        .date-input-container select { flex: 1; }
        .date-input-container input#day { flex: 0.8; text-align: center; }

        /* 버튼 스타일 */
        .submit-btn {
            width: 100%;
            padding: 16px 20px;
            background: var(--red-dark);
            color: var(--bg);
            border: none;
            border-radius: 50px;
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--red-main);
            transform: translateY(-2px);
        }
        .submit-btn:disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }

        .helper-text {
            font-size: 0.8rem;
            color: #666;
            text-align: center;
            margin-top: 20px;
            font-family: var(--font-serif);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .form-card { padding: 30px 20px; box-shadow: 6px 6px 0px rgba(0,0,0,0.1); }
            .form-title { font-size: 1.7rem; }
        }
    </style>
</head>
<body>
    <div class="paper-grain"></div>

    <div class="main-container">
        <div class="form-card">
            <!-- VHS 장식 요소 -->
            <div class="vhs-deco">
                <div class="stripe s-3"></div>
                <div class="stripe s-2"></div>
                <div class="stripe s-1"></div>
            </div>

            <div class="brand-header">
                <span class="brand-logo">2026 쿼터파이</span>
                <h1 class="form-title">33기 부원 모집 결과 조회</h1>
            </div>
            
            <form onsubmit="submitForm(event)">
                <div class="input-group">
                    <label for="examNumber">학번</label>
                    <input type="text" id="examNumber" placeholder="학번 (예: 2308)" required>
                </div>

                <div class="input-group">
                    <label>생년월일</label>
                    <div class="date-input-container">
                        <select id="year" required>
                            <option value="">연도</option>
                        </select>
                        <select id="month" required>
                            <option value="">월</option>
                            <option value="1">1월</option><option value="2">2월</option>
                            <option value="3">3월</option><option value="4">4월</option>
                            <option value="5">5월</option><option value="6">6월</option>
                            <option value="7">7월</option><option value="8">8월</option>
                            <option value="9">9월</option><option value="10">10월</option>
                            <option value="11">11월</option><option value="12">12월</option>
                        </select>
                        <input type="number" id="day" placeholder="일" min="1" max="31" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" placeholder="지원자 성명" required>
                </div>

                <button type="submit" class="submit-btn">결과 확인하기</button>
            </form>
            <p class="helper-text">입력하신 정보는 조회 목적으로만 사용됩니다.</p>
        </div>
    </div>

    <script>
    function populateYears() {
        const yearSelect = document.getElementById('year');
        const currentYear = new Date().getFullYear();
        // 학생 대상이므로 범위를 조금 더 현실적으로 조정 (2000년생 ~ 현재)
        for (let year = currentYear; year >= 2000; year--) {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year + '년';
            yearSelect.appendChild(option);
        }
    }

    async function submitForm(event) {
        event.preventDefault();
        
        const examNumber = document.getElementById('examNumber').value.trim();
        const year = document.getElementById('year').value;
        const month = document.getElementById('month').value;
        const day = document.getElementById('day').value;
        const name = document.getElementById('name').value.trim();

        // 날짜 포맷팅 (자리수 맞춤)
        const formattedMonth = month.padStart(2, '0');
        const formattedDay = day.padStart(2, '0');
        const dob = `${year}년 ${formattedMonth}월 ${formattedDay}일`; // 저장용 포맷 유지

        const submitBtn = event.target.querySelector('.submit-btn');
        const originalText = submitBtn.textContent;
        
        submitBtn.textContent = '확인 중...';
        submitBtn.disabled = true;

        try {
            // 캐시 방지 쿼리
            const response = await fetch('./list.json?t=' + new Date().getTime()); 
            if (!response.ok) throw new Error("데이터 파일을 불러올 수 없습니다.");
            
            const data = await response.json();

            let found = false;
            
            // 데이터 비교 로직
            for (let i = 0; i < data.length; i++) {
                const targetId = String(data[i].학번 || "").trim();
                const targetName = String(data[i].이름 || "").trim();

                if (targetId === examNumber && targetName === name) {
                    found = true;
                    break;
                }
            }

            // 세션 스토리지 저장
            sessionStorage.setItem("examNumber", examNumber);
            sessionStorage.setItem("dob", dob);
            sessionStorage.setItem("name", name);
            sessionStorage.setItem("status", found ? 'pass' : 'fail');
            
            // 결과 페이지 이동
            window.location.href = 'result.html';

        } catch (error) {
            alert('오류가 발생했습니다: ' + error.message);
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
        }
    }

    document.addEventListener('DOMContentLoaded', populateYears);
    </script>
</body>
</html>
